openapi: 3.0.0
info:
  title: Restaurant Reservation API
  version: 1.0.0
  description: |
    REST API for managing restaurant reservations.
    
    **Rules:**
    - User can create at most **3 reservations per day** per restaurant
    - Reservation duration is **2 hours** (overlap check applied)
    - Reservations can only be made during **opening hours**

servers:
  - url: http://localhost:5000/api/v1

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3b4e5d6f7a8b9c0d1"
        name:
          type: string
          example: "John Doe"
        tel:
          type: string
          example: "0812345678"
        email:
          type: string
          example: "john@example.com"
        role:
          type: string
          enum: [user, admin]
          example: "user"
        createdAt:
          type: string
          format: date-time

    Restaurant:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3b4e5d6f7a8b9c0d2"
        name:
          type: string
          example: "The Good Table"
        address:
          type: string
          example: "123 Main St, Bangkok"
        tel:
          type: string
          example: "0212345678"
        totalTables:
          type: integer
          example: 20
        openingHours:
          type: array
          items:
            type: object
            properties:
              day:
                type: string
                enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
              open:
                type: string
                example: "09:00"
              close:
                type: string
                example: "22:00"
              closed:
                type: boolean
                example: false

    Reservation:
      type: object
      properties:
        _id:
          type: string
          example: "64a1f2c3b4e5d6f7a8b9c0d3"
        reservationDate:
          type: string
          format: date-time
          example: "2025-06-15T18:00:00.000Z"
        endTime:
          type: string
          format: date-time
          example: "2025-06-15T20:00:00.000Z"
          description: Auto-calculated as reservationDate + 2 hours
        tableCount:
          type: integer
          minimum: 1
          example: 2
        user:
          type: string
          example: "64a1f2c3b4e5d6f7a8b9c0d1"
        restaurant:
          oneOf:
            - type: string
              example: "64a1f2c3b4e5d6f7a8b9c0d2"
            - type: object
              properties:
                _id:
                  type: string
                name:
                  type: string
                address:
                  type: string
                tel:
                  type: string
        createdAt:
          type: string
          format: date-time

    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        token:
          type: string
          example: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        msg:
          type: string
          example: "Error message"

paths:
  # ==================== AUTH ====================
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, tel, email, password]
              properties:
                name:
                  type: string
                  example: "John Doe"
                tel:
                  type: string
                  example: "0812345678"
                email:
                  type: string
                  example: "john@example.com"
                password:
                  type: string
                  minLength: 6
                  example: "password123"
                role:
                  type: string
                  enum: [user, admin]
                  default: user
      responses:
        "201":
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: "john@example.com"
                password:
                  type: string
                  example: "password123"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Missing email or password
        "401":
          description: Invalid credentials
        "500":
          description: Server error

  /auth/me:
    get:
      tags:
        - Auth
      summary: Get current logged-in user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
        "404":
          description: User not found
        "500":
          description: Server error

  /auth/logout:
    get:
      tags:
        - Auth
      summary: Logout current user (clears cookie)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
        "500":
          description: Server error

  # ==================== RESTAURANTS ====================
  /restaurants:
    get:
      tags:
        - Restaurants
      summary: Get all restaurants (Public)
      parameters:
        - in: query
          name: select
          schema:
            type: string
          description: Comma-separated fields to select (e.g. name,address)
        - in: query
          name: sort
          schema:
            type: string
          description: Sort by field (e.g. name or -name for descending)
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 25
      responses:
        "200":
          description: List of restaurants with pagination
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                    example: 5
                  pagination:
                    type: object
                    properties:
                      next:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                      prev:
                        type: object
                        properties:
                          page:
                            type: integer
                          limit:
                            type: integer
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Restaurant"
        "400":
          description: Bad request

    post:
      tags:
        - Restaurants
      summary: Create a new restaurant (Admin only)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, address, tel, totalTables]
              properties:
                name:
                  type: string
                  example: "The Good Table"
                address:
                  type: string
                  example: "123 Main St, Bangkok"
                tel:
                  type: string
                  example: "0212345678"
                totalTables:
                  type: integer
                  example: 20
                openingHours:
                  type: array
                  items:
                    type: object
                    properties:
                      day:
                        type: string
                        enum: [Monday, Tuesday, Wednesday, Thursday, Friday, Saturday, Sunday]
                      open:
                        type: string
                        example: "09:00"
                      close:
                        type: string
                        example: "22:00"
                      closed:
                        type: boolean
                        example: false
      responses:
        "201":
          description: Restaurant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "400":
          description: Validation error
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — Admin only

  /restaurants/{id}:
    get:
      tags:
        - Restaurants
      summary: Get single restaurant (Public)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restaurant data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "404":
          description: Restaurant not found

    put:
      tags:
        - Restaurants
      summary: Update restaurant (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                address:
                  type: string
                tel:
                  type: string
                totalTables:
                  type: integer
                openingHours:
                  type: array
                  items:
                    type: object
      responses:
        "200":
          description: Restaurant updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Restaurant"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — Admin only
        "404":
          description: Restaurant not found

    delete:
      tags:
        - Restaurants
      summary: Delete restaurant and all its reservations (Admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Restaurant deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — Admin only
        "404":
          description: Restaurant not found

  # ==================== RESERVATIONS (nested) ====================
  /restaurants/{restaurantId}/reservations:
    get:
      tags:
        - Reservations
      summary: Get reservations for a specific restaurant
      description: Admin sees all, User sees only their own
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reservation"
        "401":
          description: Unauthorized
        "500":
          description: Server error

    post:
      tags:
        - Reservations
      summary: Create a new reservation
      description: |
        **Rules enforced:**
        - Max **3 reservations per day** (non-admin users)
        - Must be within **opening hours**
        - Table availability checked with **2-hour overlap window**
        - `endTime` auto-calculated as `reservationDate + 2 hours`
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: restaurantId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reservationDate, tableCount]
              properties:
                reservationDate:
                  type: string
                  format: date-time
                  example: "2025-06-15T18:00:00.000Z"
                tableCount:
                  type: integer
                  minimum: 1
                  example: 2
      responses:
        "201":
          description: Reservation created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Reservation"
        "400":
          description: |
            Possible reasons:
            - Already has 3 reservations on this date
            - Restaurant is closed at requested time
            - Not enough tables available
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
        "404":
          description: Restaurant not found
        "500":
          description: Server error

  # ==================== RESERVATIONS (standalone) ====================
  /reservations:
    get:
      tags:
        - Reservations
      summary: Get all reservations
      description: Admin sees all in system, User sees only their own
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Reservation"
        "401":
          description: Unauthorized
        "500":
          description: Server error

  /reservations/{id}:
    get:
      tags:
        - Reservations
      summary: Get single reservation
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reservation data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Reservation"
        "401":
          description: Unauthorized
        "404":
          description: Reservation not found
        "500":
          description: Server error

    put:
      tags:
        - Reservations
      summary: Update reservation (owner or admin only)
      description: |
        Re-validates opening hours and table availability if date or tableCount is changed.
        `endTime` is auto-recalculated if `reservationDate` is updated.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reservationDate:
                  type: string
                  format: date-time
                  example: "2025-06-20T18:00:00.000Z"
                tableCount:
                  type: integer
                  minimum: 1
                  example: 3
      responses:
        "200":
          description: Reservation updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: "#/components/schemas/Reservation"
        "400":
          description: Restaurant closed or not enough tables
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — not owner or admin
        "404":
          description: Reservation not found
        "500":
          description: Server error

    delete:
      tags:
        - Reservations
      summary: Delete reservation (owner or admin only)
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reservation deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
        "403":
          description: Forbidden — not owner or admin
        "404":
          description: Reservation not found
        "500":
          description: Server error
